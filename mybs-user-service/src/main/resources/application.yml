server:
  port: 8081

spring:
  application:
    name: mybs-user-service
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/db_user_service?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: public
        username: nacos
        password: nacos
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml
        namespace: public
        import-check:
          enabled: false
  # Redis (用于 Session 管理和 Token 存储)
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: "123456"
      timeout: 3000ms

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT
jwt:
  secret: mybs-jwt-secret-key-2026-cloud-honeypot-management-system
  expiration: 86400000
