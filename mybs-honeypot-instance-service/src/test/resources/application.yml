server:
  port: 8083

spring:
  application:
    name: mybs-honeypot-instance-service
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/db_hp_instance_service?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: public
        username: nacos
        password: nacos
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml
        namespace: public
        import-check:
          enabled: false
  rabbitmq:
    host: 127.0.0.1
    port: 5672
    virtual-host: mybs
    username: mybs
    password: mybs
    listener:
      simple:
        concurrency: 5
        max-concurrency: 10
        prefetch: 1

mybatis-plus:
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
