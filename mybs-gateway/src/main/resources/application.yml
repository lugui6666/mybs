server:
  port: 3000

spring:
  application:
    name: mybs-gateway
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
  data:
    redis:
      host: localhost
      port: 6379
      password: "123456"
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          min-idle: 0
          max-active: 8
          max-idle: 8
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: public
        username: nacos
        password: nacos
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml
        namespace: public
        import-check:
          enabled: false
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # 用户管理服务 + 认证
        - id: user-service
          uri: lb://mybs-user-service
          predicates:
            - Path=/api/user/**,/api/auth/**
        # 蜜罐类型管理服务
        - id: honeypot-type-service
          uri: lb://mybs-honeypot-type-service
          predicates:
            - Path=/api/hp-type/**
        # 蜜罐实例管理服务
        - id: honeypot-instance-service
          uri: lb://mybs-honeypot-instance-service
          predicates:
            - Path=/api/hp-instance/**
        # 日志管理服务
        - id: log-service
          uri: lb://mybs-log-service
          predicates:
            - Path=/api/logs/**

# JWT 配置
jwt:
  secret: mybs-jwt-secret-key-2026-cloud-honeypot-management-system
  expiration: 86400000  # 24小时，单位毫秒

# 白名单路径（跳过 JWT 鉴权）
auth:
  white-list:
    - /api/auth/login
    - /api/auth/register